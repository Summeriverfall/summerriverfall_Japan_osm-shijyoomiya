<style>
  :root{--wood:#8B4513;--wine:#800020;--cream:#FFF8E1;--gold:#c9a24a;--gold-soft:#d8b877;--ink:#140f0b;--ink-2:#1e1712;--line:rgba(201,162,74,.22);--muted:rgba(255,248,225,.62)}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{font-family:'Noto Serif SC','Noto Serif JP',serif;background:var(--ink);color:var(--cream);min-height:100vh;padding:40px 20px;-webkit-font-smoothing:antialiased;position:relative}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(120% 80% at 50% 0%,rgba(201,162,74,.10) 0%,rgba(20,15,11,0) 55%);pointer-events:none;z-index:0}
  .booking-container{max-width:620px;margin:0 auto;position:relative;z-index:1;animation:fadeInUp .7s ease-out}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .booking-top-bar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:2rem}
  .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .3s}
  .back-link:hover{color:var(--gold)}
  .lang-switch{display:flex;align-items:center;gap:.3rem;flex-shrink:0}
  .lang-switch button{font-size:.7rem;letter-spacing:.06em;color:var(--muted);padding:.35rem .5rem;border:none;border-radius:4px;background:transparent;cursor:pointer;font-family:inherit;transition:all .3s}
  .lang-switch button:hover{color:var(--gold)}
  .lang-switch button.active{color:var(--gold);background:rgba(201,162,74,.12)}
  .booking-header{text-align:center;margin-bottom:2.2rem}
  .brand-badge{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:50px;padding:7px 20px;margin-bottom:1rem;font-size:.72rem;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;font-family:'Cormorant Garamond',serif}
  .booking-title{font-size:clamp(1.9rem,5vw,2.4rem);font-weight:600;letter-spacing:.05em;color:#fff;margin-bottom:.5rem}
  .booking-subtitle{font-size:.98rem;color:var(--muted)}
  .booking-card{background:linear-gradient(180deg,var(--ink-2),rgba(30,23,18,.6));border:1px solid var(--line);border-radius:16px;padding:2.4rem;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  .form-group{margin-bottom:1.6rem}
  .form-label{display:block;font-size:.84rem;font-weight:500;color:var(--cream);margin-bottom:.5rem;letter-spacing:.04em}
  .form-input,.form-select{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:9px;font-size:1rem;font-family:inherit;color:var(--cream);background:rgba(20,15,11,.65);transition:all .3s}
  .form-select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23c9a24a' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
  .form-input:focus,.form-select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,74,.14);background:rgba(20,15,11,.9)}
  .form-input::placeholder{color:rgba(255,248,225,.4)}
  input[type="date"]{color-scheme:dark}
  .form-hint{font-size:.78rem;color:var(--muted);margin-top:.5rem}
  .form-error{color:#e57373;font-size:.82rem;margin-top:.5rem;display:none}
  .form-group.error .form-error{display:block}
  .form-group.error .form-input,.form-group.error .form-select,.form-group.error .time-picker-display{border-color:#e57373}
  .time-picker{position:relative}
  .time-picker-display{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
  .time-placeholder{color:rgba(255,248,225,.4)}
  .time-picker-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--ink-2);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.5);z-index:200;overflow:hidden}
  .time-picker-panel.open{display:block}
  .time-col-header{display:flex;border-bottom:1px solid var(--line);background:rgba(201,162,74,.06)}
  .time-col-header span{flex:1;text-align:center;padding:8px;font-size:.7rem;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .time-cols{display:flex}
  .time-col{flex:1;max-height:210px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .time-col-sep{width:1px;background:var(--line)}
  .time-option{padding:11px 8px;text-align:center;cursor:pointer;font-size:1rem;transition:background .15s}
  .time-option:hover{background:rgba(201,162,74,.14)}
  .time-option.selected{background:var(--gold);color:var(--ink);font-weight:600}
  .message-preview{margin-top:.5rem;margin-bottom:1.5rem;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:rgba(20,15,11,.5)}
  .message-preview-header{display:flex;align-items:center;gap:8px;padding:.7rem 1rem;background:rgba(201,162,74,.1);border-bottom:1px solid var(--line);font-size:.76rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
  .message-preview-icon{width:18px;height:18px;color:#25D366;flex-shrink:0}
  .message-preview-icon svg{width:100%;height:100%;fill:currentColor}
  .message-preview-body{display:none;margin:0;padding:1rem 1.1rem;font-family:inherit;font-size:.9rem;line-height:1.7;color:var(--cream);white-space:pre-wrap;word-break:break-word;background:rgba(37,211,102,.06);border-left:3px solid #25D366}
  .message-preview-hint{margin:0;padding:1rem 1.1rem;font-size:.86rem;line-height:1.6;color:var(--muted);font-style:italic}
  .message-preview.ready .message-preview-body{display:block}
  .message-preview.ready .message-preview-hint{display:none}
  .submit-button{width:100%;padding:15px;background:#25D366;color:#0b2e18;border:none;border-radius:50px;font-size:1.02rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .3s;margin-top:.4rem;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 2px 12px rgba(37,211,102,.28)}
  .submit-button:hover{background:#2ee06f;transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,211,102,.4)}
  .submit-button:active{transform:translateY(0)}
  .submit-button:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .whatsapp-icon{width:20px;height:20px;display:inline-flex}
  .whatsapp-icon svg{width:100%;height:100%;fill:currentColor}
  .info-note{font-size:.8rem;color:var(--muted);text-align:center;margin-top:1.2rem;line-height:1.7}
  .success-message{display:none;background:rgba(37,211,102,.1);border:1px solid #25D366;border-radius:9px;padding:1rem;margin-bottom:1.4rem;color:#7ee2a5;font-size:.93rem;text-align:center}
  .success-message.show{display:block;animation:fadeInUp .5s ease-out}
  html[lang="ja"]{font-family:'Noto Serif JP',serif}
  html[lang="zh-CN"]{font-family:'Noto Serif SC',serif}
  html[lang="zh-TW"]{font-family:'Noto Serif TC','Noto Serif SC',serif}
  html[lang="en"]{font-family:'Cormorant Garamond','Noto Serif JP',serif}
  @media (max-width:768px){body{padding:24px 15px}.booking-card{padding:1.9rem 1.4rem}.booking-top-bar{flex-wrap:wrap;gap:.75rem}}

      tw:{htmlLang:'zh-TW',title:'預約 — 酒的美術館 四條大宮店',backLink:'返回首頁',brandBadge:'RESERVATION',bookingTitle:'Whisky Tasting 預約',bookingSubtitle:'填寫以下資訊，一鍵產生 WhatsApp 預約訊息',successMessage:'預約資訊已產生，即將跳轉至 WhatsApp…',labelTheme:'品飲主題',hintTheme:'可選。亦可於店內由侍酒師為您推薦。',labelDate:'日期 *',labelTime:'時間 *',labelGuests:'人數 *',labelName:'姓名 *',errorDate:'請選擇日期',errorTime:'請選擇時間',errorGuests:'請選擇人數',errorName:'請輸入姓名',namePlaceholder:'請輸入您的姓名',submitButton:'提交並開啟 WhatsApp',redirecting:'跳轉中…',previewTitle:'WhatsApp 訊息預覽',previewHint:'填寫上方必填項後，可於傳送前預覽訊息內容。',themeGeneral:'不指定（交給侍酒師推薦）',timePlaceholder:'請選擇時間',hourLabel:'時',minuteLabel:'分',selectGuests:'請選擇人數',guestUnit:' 人',hoursHint:'營業時間 17:30〜24:00 ／ 週四定休',waIntro:'您好！我想預約四條大宮店 Whisky Tasting。\n\n',waTheme:'主題',waName:'姓名',waDate:'日期',waTime:'時間',waGuests:'人數',dateLocale:'zh-TW'}
    };

    var currentLang = DEFAULT_LANG;
    function t(k){return i18n[currentLang][k];}
    function pad(n){return n<10?'0'+n:String(n);}

    function buildThemeOptions(sel){
      var html = '<option value="">'+t('themeGeneral')+'</option>';
      THEMES.forEach(function(x){
        var s = x.nn===sel ? ' selected' : '';
        html += '<option value="'+x.nn+'"'+s+'>THEME '+x.nn+' · '+x[currentLang]+'</option>';
      });
      return html;
    }
    function buildGuestsOptions(sel){
      var html = '<option value="">'+t('selectGuests')+'</option>';
      for(var i=1;i<=8;i++){ var s=String(i)===sel?' selected':''; html+='<option value="'+i+'"'+s+'>'+i+t('guestUnit')+'</option>'; }
      return html;
    }

    var timeState={selH:null,selM:null};
    function initTimePicker(){
      var display=document.getElementById('timePickerDisplay'),panel=document.getElementById('timePickerPanel'),textEl=document.getElementById('timePickerText'),hourCol=document.getElementById('hourCol'),minCol=document.getElementById('minuteCol'),hidden=document.getElementById('time');
      OPEN_HOURS.forEach(function(h){var hs=pad(h);var d=document.createElement('div');d.className='time-option';d.textContent=hs;d.addEventListener('click',function(e){e.stopPropagation();hourCol.querySelectorAll('.time-option').forEach(function(o){o.classList.remove('selected');});d.classList.add('selected');timeState.selH=hs;commit();});hourCol.appendChild(d);});
      MINUTES.forEach(function(m){var ms=pad(m);var d=document.createElement('div');d.className='time-option';d.textContent=ms;d.addEventListener('click',function(e){e.stopPropagation();minCol.querySelectorAll('.time-option').forEach(function(o){o.classList.remove('selected');});d.classList.add('selected');timeState.selM=ms;commit();});minCol.appendChild(d);});
      function commit(){if(timeState.selH===null||timeState.selM===null)return;hidden.value=timeState.selH+':'+timeState.selM;textEl.textContent=hidden.value;textEl.classList.remove('time-placeholder');document.getElementById('timeGroup').classList.remove('error');setTimeout(function(){panel.classList.remove('open');},220);updatePreview();}
      display.addEventListener('click',function(e){e.stopPropagation();panel.classList.toggle('open');});
      panel.addEventListener('click',function(e){e.stopPropagation();});
      document.addEventListener('click',function(){panel.classList.remove('open');});
    }
    function updateTimeLabels(){
      document.getElementById('hourColHeader').textContent=t('hourLabel');
      document.getElementById('minuteColHeader').textContent=t('minuteLabel');
      var textEl=document.getElementById('timePickerText');
      if(!document.getElementById('time').value){textEl.textContent=t('timePlaceholder');textEl.classList.add('time-placeholder');}
    }

    function getInitialLang(){
      var p=new URLSearchParams(location.search);var l=p.get('lang');
      if(l==='cn'||l==='jp'||l==='en'||l==='tw')return l;
      return DEFAULT_LANG;
    }
    function applyLang(lang){
      currentLang=lang;var o=i18n[lang];
      var tv=document.getElementById('theme').value,gv=document.getElementById('guests').value;
      document.documentElement.lang=o.htmlLang;document.title=o.title;
      document.getElementById('backLinkText').textContent=o.backLink;
      document.getElementById('brandBadge').textContent=o.brandBadge;
      document.getElementById('bookingTitle').textContent=o.bookingTitle;
      document.getElementById('bookingSubtitle').textContent=o.bookingSubtitle;
      document.getElementById('successMessage').textContent=o.successMessage;
      document.getElementById('labelTheme').textContent=o.labelTheme;
      document.getElementById('hintTheme').textContent=o.hintTheme;
      document.getElementById('labelDate').textContent=o.labelDate;
      document.getElementById('labelTime').textContent=o.labelTime;
      document.getElementById('labelGuests').textContent=o.labelGuests;
      document.getElementById('labelName').textContent=o.labelName;
      document.getElementById('hintTime').textContent=o.hoursHint;
      document.getElementById('errorDate').textContent=o.errorDate;
      document.getElementById('errorTime').textContent=o.errorTime;
      document.getElementById('errorGuests').textContent=o.errorGuests;
      document.getElementById('errorName').textContent=o.errorName;
      document.getElementById('name').placeholder=o.namePlaceholder;
      document.getElementById('submitButtonText').textContent=o.submitButton;
      document.getElementById('previewTitle').textContent=o.previewTitle;
      document.getElementById('previewHint').textContent=o.previewHint;
      document.getElementById('infoNote').textContent=o.hoursHint;
      document.getElementById('theme').innerHTML=buildThemeOptions(tv);
      document.getElementById('guests').innerHTML=buildGuestsOptions(gv);
      updateTimeLabels();
      document.querySelectorAll('.lang-switch button').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-lang')===lang);});
      var url=new URL(location.href);url.searchParams.set('lang',lang);history.replaceState(null,'',url);
      updatePreview();
    }

    function formatDate(ds){var d=new Date(ds+'T00:00:00');return d.toLocaleDateString(t('dateLocale'),{year:'numeric',month:'long',day:'numeric'});}
    function themeLabel(){var v=document.getElementById('theme').value;if(!v)return t('themeGeneral');for(var i=0;i<THEMES.length;i++){if(THEMES[i].nn===v)return 'THEME '+v+' · '+THEMES[i][currentLang];}return t('themeGeneral');}
    function isComplete(){return document.getElementById('name').value.trim()&&document.getElementById('date').value&&document.getElementById('time').value&&document.getElementById('guests').value;}
    function buildMessage(){
      var name=document.getElementById('name').value.trim();
      var sep=currentLang==='en'?': ':'：';
      var m=t('waIntro');
      m+='- '+t('waTheme')+sep+themeLabel()+'\n';
      m+='- '+t('waName')+sep+name+'\n';
      m+='- '+t('waDate')+sep+formatDate(document.getElementById('date').value)+'\n';
      m+='- '+t('waTime')+sep+document.getElementById('time').value+'\n';
      m+='- '+t('waGuests')+sep+document.getElementById('guests').value+(currentLang==='en'?'':t('guestUnit'));
      return m;
    }
    function updatePreview(){
      var ps=document.getElementById('messagePreview'),pb=document.getElementById('previewBody');
      if(!isComplete()){ps.classList.remove('ready');pb.textContent='';return;}
      pb.textContent=buildMessage();ps.classList.add('ready');
    }
    function validate(){
      var ok=true;document.querySelectorAll('.form-group').forEach(function(g){g.classList.remove('error');});
      if(!document.getElementById('date').value){document.getElementById('dateGroup').classList.add('error');ok=false;}
      if(!document.getElementById('time').value){document.getElementById('timeGroup').classList.add('error');ok=false;}
      if(!document.getElementById('guests').value){document.getElementById('guestsGroup').classList.add('error');ok=false;}
      if(!document.getElementById('name').value.trim()){document.getElementById('nameGroup').classList.add('error');ok=false;}
      return ok;
    }

    document.getElementById('date').setAttribute('min',new Date().toISOString().split('T')[0]);
    initTimePicker();
    applyLang(getInitialLang());
    (function(){var p=new URLSearchParams(location.search);var th=p.get('theme');if(th){th=('0'+th).slice(-2);var sel=document.getElementById('theme');for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===th){sel.selectedIndex=i;break;}}}updatePreview();})();
    document.querySelectorAll('.lang-switch button').forEach(function(b){b.addEventListener('click',function(){applyLang(this.getAttribute('data-lang'));});});
    document.getElementById('bookingForm').addEventListener('input',updatePreview);
    document.getElementById('bookingForm').addEventListener('change',updatePreview);
    document.querySelectorAll('.form-input,.form-select').forEach(function(inp){
      inp.addEventListener('blur',function(){var g=this.closest('.form-group');if(this.hasAttribute('required')&&!this.value.trim())g.classList.add('error');});
      inp.addEventListener('input',function(){var g=this.closest('.form-group');if(g.classList.contains('error')&&this.value.trim())g.classList.remove('error');});
    });
    document.getElementById('bookingForm').addEventListener('submit',function(e){
      e.preventDefault();if(!validate())return;
      var url='https://api.whatsapp.com/send/?phone='+WHATSAPP_NUMBER+'&text='+encodeURIComponent(buildMessage())+'&type=phone_number&app_absent=0';
      document.getElementById('successMessage').classList.add('show');
      document.getElementById('submitButton').disabled=true;
      document.getElementById('submitButtonText').textContent=t('redirecting');
      setTimeout(function(){window.open(url,'_blank');},500);
    });
    updatePreview();
  </script>
</body>
</html>
