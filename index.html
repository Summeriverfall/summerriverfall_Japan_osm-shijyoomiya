<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お酒の美術館 — 四条大宮 | OSM Whisky &amp; Spirits Bar Kyoto</title>
<meta name="description" content="お酒の美術館 四条大宮店。ワンコインで世界の佳酿を。京都・四条大宮のウイスキー＆スピリッツバー。Liquor Museum, Shijo-Omiya, Kyoto.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#15110d;--bg2:#0c0a07;--gold:#c9a227;--gold-soft:#d9bd76;--cream:#efe6d2;--line:rgba(201,162,39,.28)}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{min-height:100vh;background:radial-gradient(130% 100% at 50% -10%,#261c10 0%,var(--bg) 46%,var(--bg2) 100%);color:var(--cream);font-family:'Noto Serif JP','Noto Serif SC',serif;display:flex;align-items:center;justify-content:center;padding:2.2rem 1.4rem;text-align:center;position:relative;overflow:hidden}
  body::before{content:"";position:absolute;inset:0;background:url("images/6.webp") center/cover no-repeat;opacity:.12;filter:grayscale(.35) contrast(1.05)}
  body::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 30%,transparent 40%,rgba(8,6,4,.72) 100%)}
  .wrap{position:relative;z-index:1;max-width:660px;width:100%}
  .kicker{font-family:'Cormorant Garamond',serif;letter-spacing:.42em;text-transform:uppercase;font-size:.78rem;color:var(--gold)}
  h1{font-size:clamp(2.4rem,8vw,4.1rem);font-weight:600;margin:.7rem 0 .25rem;color:#fff;letter-spacing:.06em}
  .en{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,3vw,1.25rem);letter-spacing:.24em;color:var(--gold-soft);text-transform:uppercase}
  .rule{width:66px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.5rem auto}
  .tagline{font-size:clamp(.95rem,2.6vw,1.08rem);color:var(--cream);opacity:.82;line-height:2}
  .langs{display:grid;grid-template-columns:repeat(2,1fr);gap:.9rem;margin:2.3rem auto 0;max-width:440px}
  .lang{display:block;padding:1.05rem .8rem;border:1px solid var(--line);border-radius:11px;background:rgba(201,162,39,.05);color:var(--cream);text-decoration:none;transition:border-color .25s,background .25s,transform .25s}
  .lang:hover{border-color:var(--gold);background:rgba(201,162,39,.14);transform:translateY(-2px)}
  .lang .n{display:block;font-size:1.16rem;color:#fff;font-weight:500}
  .lang .s{display:block;font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.18em;color:var(--gold-soft);text-transform:uppercase;margin-top:.25rem}
  .meta{margin-top:2.1rem;font-size:.8rem;color:var(--cream);opacity:.55;letter-spacing:.09em}
  @media(max-width:430px){.langs{grid-template-columns:1fr;max-width:280px}}
</style>
</head>
<body>
  <main class="wrap">
    <p class="kicker">Kyoto · Shijo-Omiya</p>
    <h1>お酒の美術館</h1>
    <p class="en">Liquor Museum</p>
    <div class="rule"></div>
    <p class="tagline">ワンコインで、世界の佳酿を。<br>500日圓起，暢飲世界佳釀 · World spirits from one coin.</p>

      <a class="lang" href="jp/index.html"><span class="n">日本語</span><span class="s">Japanese</span></a>
      <a class="lang" href="en/index.html"><span class="n">English</span><span class="s">English</span></a>
      <a class="lang" href="cn/index.html"><span class="n">简体中文</span><span class="s">Simplified</span></a>
      <a class="lang" href="tw/index.html"><span class="n">繁體中文</span><span class="s">Traditional</span></a>
    </nav>
    <p class="meta">京都市 · 四条大宮 — Whisky &amp; World Spirits Bar</p>
  </main>
</body>
</html>
